<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Slime Jump Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #87CEEB;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            max-width: 400px;
            max-height: 800px;
            background-color: #87CEEB;
            border: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            background: rgba(255,255,255,0.9);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 10;
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            z-index: 20;
        }
        #gameOverScreen h1 {
            font-size: 50px;
            margin-bottom: 20px;
        }
        #gameOverScreen p {
            font-size: 30px;
            margin-bottom: 30px;
        }
        #gameOverScreen button {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #gameOverScreen button:active {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <span id="timer">⏱️ 30s</span> | <span id="score">⭐ 0</span>
    </div>
    <div id="gameOverScreen">
        <h1 id="result">🎉 You Win!</h1>
        <p id="finalScore">Score: 0</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        // 縦向き固定
        if (screen.orientation) {
            screen.orientation.lock('portrait').catch(err => console.log(err));
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timerDisplay = document.getElementById('timer');
        const scoreDisplay = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const resultText = document.getElementById('result');
        const finalScoreText = document.getElementById('finalScore');

        // Canvas設定
        canvas.width = 400;
        canvas.height = 800;

        // ゲーム変数
        let slime = {
            x: 175,
            y: 700,
            width: 50,
            height: 50,
            velocityY: 0,
            isJumping: false
        };

        let gravity = 0.6;
        let jumpPower = 15;
        let obstacles = [];
        let timer = 30;
        let score = 0;
        let gameActive = true;

        // イベントリスナー
        document.addEventListener('click', handleJump);
        document.addEventListener('touchstart', handleJump);

        function handleJump(e) {
            if (!slime.isJumping && gameActive) {
                slime.velocityY = -jumpPower;
                slime.isJumping = true;
            }
        }

        function drawSlime() {
            // かわいいスライム
            ctx.fillStyle = '#90EE90';
            ctx.beginPath();
            ctx.arc(slime.x + slime.width / 2, slime.y + slime.height / 2, slime.width / 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 目
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(slime.x + 15, slime.y + 15, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(slime.x + 35, slime.y + 15, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // 口
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(slime.x + 25, slime.y + 30, 6, 0, Math.PI);
            ctx.stroke();
        }

        function drawObstacle(obstacle) {
            ctx.fillStyle = '#FF6B6B';
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            
            // トゲ
            ctx.fillStyle = '#FF4444';
            for (let i = 0; i < obstacle.width; i += 8) {
                ctx.beginPath();
                ctx.moveTo(obstacle.x + i + 4, obstacle.y);
                ctx.lineTo(obstacle.x + i + 8, obstacle.y - 10);
                ctx.lineTo(obstacle.x + i, obstacle.y - 10);
                ctx.fill();
            }
        }

        function drawGround() {
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(0, 750, canvas.width, 50);
            
            ctx.fillStyle = '#228B22';
            for (let i = 0; i < canvas.width; i += 20) {
                ctx.fillRect(i, 745, 15, 5);
            }
        }

        function updateGame() {
            if (!gameActive) return;

            // 物理
            slime.velocityY += gravity;
            slime.y += slime.velocityY;

            // 地面衝突
            if (slime.y + slime.height >= 750) {
                slime.y = 750 - slime.height;
                slime.isJumping = false;
                slime.velocityY = 0;
            }

            // 障害物更新
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= 6;
                
                if (obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    scoreDisplay.textContent = `⭐ ${score}`;
                }
            }

            // 衝突判定
            checkCollisions();

            // 描画
            render();
        }

        function checkCollisions() {
            for (let obstacle of obstacles) {
                if (
                    slime.x < obstacle.x + obstacle.width &&
                    slime.x + slime.width > obstacle.x &&
                    slime.y < obstacle.y + obstacle.height &&
                    slime.y + slime.height > obstacle.y
                ) {
                    endGame();
                }
            }
        }

        function render() {
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawClouds();
            drawGround();
            drawSlime();
            
            for (let obstacle of obstacles) {
                drawObstacle(obstacle);
            }
        }

        function drawClouds() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            // 雲1
            ctx.beginPath();
            ctx.arc(80, 80, 20, 0, Math.PI * 2);
            ctx.arc(110, 75, 25, 0, Math.PI * 2);
            ctx.arc(140, 80, 20, 0, Math.PI * 2);
            ctx.fill();
            
            // 雲2
            ctx.beginPath();
            ctx.arc(280, 120, 25, 0, Math.PI * 2);
            ctx.arc(320, 115, 30, 0, Math.PI * 2);
            ctx.arc(360, 120, 25, 0, Math.PI * 2);
            ctx.fill();
        }

        function spawnObstacle() {
            const height = Math.random() * 60 + 40;
            obstacles.push({
                x: canvas.width,
                y: 750 - height,
                width: 40,
                height: height
            });
        }

        function endGame() {
            gameActive = false;
            gameOverScreen.style.display = 'flex';
            
            if (timer > 0) {
                resultText.textContent = '🎉 You Win!';
                resultText.style.color = '#FFD700';
            } else {
                resultText.textContent = '💥 Game Over!';
                resultText.style.color = '#FF6B6B';
            }
            
            finalScoreText.textContent = `Score: ${score}`;
        }

        // ゲームループ
        const gameLoop = setInterval(() => {
            updateGame();
        }, 1000 / 60);

        // タイマー
        const timerInterval = setInterval(() => {
            if (gameActive) {
                timer--;
                timerDisplay.textContent = `⏱️ ${timer}s`;
                
                if (timer <= 0) {
                    endGame();
                }
            }
        }, 1000);

        // 障害物生成
        const spawnInterval = setInterval(() => {
            if (gameActive) {
                spawnObstacle();
            }
        }, 1500);

        // 初期描画
        render();
    </script>
</body>
</html>
