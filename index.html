<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>Slime Dash: Sensor Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #111; font-family: 'Share Tech Mono', monospace; touch-action: none; }
        #gameContainer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; transform-origin: top left; transition: transform 0.3s ease; }
        canvas { display: block; width: 100%; height: 100%; z-index: 1; pointer-events: auto; }
        
        /* UI Layer */
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .hud-box { background: rgba(0, 20, 10, 0.7); border: 1px solid #00ffcc; padding: 10px 15px; border-radius: 4px; color: #00ffcc; font-size: clamp(14px, 3vw, 20px); text-shadow: 0 0 5px #00ffcc; }
        #warningDisplay { color: #ff3333; border-color: #ff3333; text-shadow: 0 0 5px #ff3333; opacity: 0; transition: opacity 0.1s; }
        #warningDisplay.active { opacity: 1; animation: blink 0.2s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }
        
        /* Overlays */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 15, 20, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; pointer-events: auto; backdrop-filter: blur(4px); transition: opacity 0.3s; }
        .hidden { opacity: 0 !important; pointer-events: none !important; }
        .overlay h1 { font-size: clamp(30px, 6vw, 60px); margin-bottom: 5px; color: #fff; letter-spacing: 2px; }
        .overlay p { font-size: clamp(16px, 3vw, 24px); margin-bottom: 30px; color: #888; }
        
        /* Buttons - タッチしやすいように調整 */
        .action-button { padding: 15px 40px; font-size: clamp(18px, 4vw, 24px); font-family: 'Share Tech Mono', monospace; background: rgba(0, 255, 204, 0.1); color: #00ffcc; border: 2px solid #00ffcc; border-radius: 8px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); pointer-events: auto; }
        .action-button:active { background: #00ffcc; color: #111; transform: scale(0.95); }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div class="hud-top">
            <div class="hud-box" id="scoreDisplay">DIST: 0000m</div>
            <div class="hud-box" id="warningDisplay">⚠️ COLLISION WARN</div>
        </div>
        <div class="hud-bottom">
            <div class="hud-box" id="speedDisplay" style="width:fit-content">SYS.SPEED: 1.0x</div>
        </div>
    </div>
    
    <div id="startScreen" class="overlay">
        <h1>SENSOR DASH</h1>
        <p>Analyze & Survive</p>
        <button class="action-button" id="startBtn">SYSTEM START</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color:#ff3333;">SYSTEM HALTED</h1>
        <p id="finalScoreDisplay">Distance: 0m</p>
        <button class="action-button" id="restartBtn" style="border-color:#ff3333; color:#ff3333;">REBOOT SYSTEM</button>
    </div>
</div>

<script>
/**
 * 1. 画面制御
 */
const gameContainer = document.getElementById('gameContainer');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const VIRTUAL_WIDTH = 900;
const VIRTUAL_HEIGHT = 450;
let scaleRatio = 1;

function handleOrientation() {
    let width = window.innerWidth;
    let height = window.innerHeight;
    if (width < height) {
        gameContainer.style.width = height + 'px';
        gameContainer.style.height = width + 'px';
        gameContainer.style.transform = `rotate(90deg) translateY(-${width}px)`;
        resizeCanvas(height, width);
    } else {
        gameContainer.style.width = width + 'px';
        gameContainer.style.height = height + 'px';
        gameContainer.style.transform = 'none';
        resizeCanvas(width, height);
    }
}

function resizeCanvas(w, h) {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    scaleRatio = Math.min(w / VIRTUAL_WIDTH, h / VIRTUAL_HEIGHT);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    ctx.translate((w - VIRTUAL_WIDTH * scaleRatio) / 2, (h - VIRTUAL_HEIGHT * scaleRatio) / 2);
    ctx.scale(scaleRatio, scaleRatio);
}
window.addEventListener('resize', handleOrientation);
window.addEventListener('orientationchange', handleOrientation);

/**
 * 2. ゲームロジック・物理
 */
const GRAVITY = 0.8;
const GROUND_Y = VIRTUAL_HEIGHT - 60;
const JUMP_POWER = -13;

class Slime {
    constructor() {
        this.w = 40; this.h = 40;
        this.x = 120; this.y = GROUND_Y - this.h;
        this.vy = 0; this.jumpCount = 0;
        this.squishX = 1; this.squishY = 1;
    }
    jump() {
        if (this.jumpCount < 2) {
            this.vy = JUMP_POWER;
            this.jumpCount++;
            this.squishX = 0.6; this.squishY = 1.4;
        }
    }
    update() {
        this.vy += GRAVITY;
        this.y += this.vy;
        if (this.y + this.h >= GROUND_Y) {
            if(this.jumpCount > 0) {
                this.squishX = 1.4; this.squishY = 0.6;
            }
            this.y = GROUND_Y - this.h;
            this.vy = 0; this.jumpCount = 0;
        }
        this.squishX += (1 - this.squishX) * 0.2;
        this.squishY += (1 - this.squishY) * 0.2;
    }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x + this.w / 2, this.y + this.h);
        ctx.scale(this.squishX, this.squishY);
        
        ctx.fillStyle = '#00ffcc';
        ctx.beginPath();
        ctx.moveTo(-this.w/2, 0);
        ctx.lineTo(this.w/2, 0);
        ctx.bezierCurveTo(this.w/2, -this.h*1.2, -this.w/2, -this.h*1.2, -this.w/2, 0);
        ctx.fill();
        
        // センサーアイ
        ctx.fillStyle = '#111';
        ctx.fillRect(-10, -25, 20, 6);
        ctx.fillStyle = '#fff';
        ctx.fillRect(-8 + (state.frames % 20 > 10 ? 2 : 0), -24, 4, 4); // スキャン風
        ctx.fillRect(4 + (state.frames % 20 > 10 ? -2 : 0), -24, 4, 4);
        ctx.restore();
    }
}

class Obstacle {
    constructor(speed) {
        this.w = 30 + Math.random() * 20;
        this.h = 40 + Math.random() * 40;
        this.x = VIRTUAL_WIDTH + 50;
        this.y = GROUND_Y - this.h;
        this.speed = speed;
    }
    update() { this.x -= 6 * this.speed; }
    draw(ctx) {
        ctx.fillStyle = '#222';
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.rect(this.x, this.y, this.w, this.h);
        ctx.fill();
        ctx.stroke();
        
        // 危険模様
        ctx.strokeStyle = '#ff3333';
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + 10);
        ctx.lineTo(this.x + this.w, this.y + 10);
        ctx.stroke();
    }
}

class RainDrop {
    constructor() {
        this.x = Math.random() * VIRTUAL_WIDTH * 1.5;
        this.y = Math.random() * -VIRTUAL_HEIGHT;
        this.speed = 10 + Math.random() * 10;
        this.len = 10 + Math.random() * 20;
    }
    update(wind) {
        this.y += this.speed;
        this.x -= wind * 5; // 向かい風の影響
        if (this.y > GROUND_Y) {
            this.y = -50;
            this.x = Math.random() * VIRTUAL_WIDTH * 1.5;
        }
    }
    draw(ctx) {
        ctx.strokeStyle = 'rgba(100, 200, 255, 0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x - 5, this.y + this.len);
        ctx.stroke();
    }
}

/**
 * 3. メインループとセンサー処理
 */
let state = { active: false, score: 0, speedMulti: 1.0, frames: 0 };
let slime, obstacles, rain;

function initGame() {
    slime = new Slime();
    obstacles = [];
    rain = Array.from({length: 50}, () => new RainDrop());
    state = { active: true, score: 0, speedMulti: 1.0, frames: 0 };
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('warningDisplay').classList.remove('active');
    requestAnimationFrame(gameLoop);
}

function gameOver() {
    state.active = false;
    document.getElementById('warningDisplay').classList.remove('active');
    document.getElementById('finalScoreDisplay').textContent = `Distance: ${Math.floor(state.score)}m`;
    document.getElementById('gameOverScreen').classList.remove('hidden');
}

// 予測軌道を描画する関数
function drawTrajectory(ctx, slime) {
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(0, 255, 204, 0.4)';
    ctx.setLineDash([5, 5]);
    ctx.lineWidth = 2;
    
    let simX = slime.x + slime.w/2;
    let simY = slime.y + slime.h;
    let simVy = slime.vy === 0 ? JUMP_POWER : slime.vy; // 接地時はジャンプしたと仮定
    
    ctx.moveTo(simX, simY);
    for(let i=0; i<30; i++) {
        simX += 6 * state.speedMulti; // 仮の進行速度
        simVy += GRAVITY;
        simY += simVy;
        if(simY >= GROUND_Y) {
            ctx.lineTo(simX, GROUND_Y);
            break;
        }
        ctx.lineTo(simX, simY);
    }
    ctx.stroke();
    ctx.setLineDash([]);
}

// 前方センサーの描画と警告判定
function drawSensorAndCheckWarning(ctx, slime, obstacles) {
    let nearestObs = obstacles.find(o => o.x > slime.x);
    if (!nearestObs) return;

    let dist = nearestObs.x - (slime.x + slime.w);
    let sensorColor = '#00ffcc'; // 緑
    let isWarning = false;

    if (dist < 300) sensorColor = '#ffcc00'; // 黄
    if (dist < 150) {
        sensorColor = '#ff3333'; // 赤
        isWarning = true;
    }

    // レーザー描画
    ctx.strokeStyle = sensorColor;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(slime.x + slime.w, slime.y + slime.h/2);
    ctx.lineTo(nearestObs.x, slime.y + slime.h/2);
    ctx.stroke();

    // 距離テキスト描画
    ctx.fillStyle = sensorColor;
    ctx.font = '12px "Share Tech Mono"';
    ctx.fillText(`${Math.floor(dist)}m`, slime.x + slime.w + 10, slime.y + slime.h/2 - 5);

    // UI警告の切り替え
    const warningUI = document.getElementById('warningDisplay');
    if(isWarning && slime.y + slime.h >= nearestObs.y) {
        warningUI.classList.add('active');
    } else {
        warningUI.classList.remove('active');
    }
}

function update() {
    if (!state.active) return;
    state.frames++;
    state.speedMulti = Math.min(2.0, 1.0 + (state.score / 1500));
    state.score += 0.1 * state.speedMulti;
    
    document.getElementById('scoreDisplay').textContent = `DIST: ${String(Math.floor(state.score)).padStart(4, '0')}m`;
    document.getElementById('speedDisplay').textContent = `SYS.SPEED: ${state.speedMulti.toFixed(2)}x`;

    slime.update();
    rain.forEach(r => r.update(state.speedMulti));

    if (state.frames % Math.floor(Math.max(50, 100 - state.speedMulti*20)) === 0) {
        obstacles.push(new Obstacle(state.speedMulti));
    }

    obstacles.forEach((obs, i) => {
        obs.update();
        if (obs.x + obs.w < 0) obstacles.splice(i, 1);
        
        // 当たり判定
        let margin = 4;
        if (slime.x + margin < obs.x + obs.w && slime.x + slime.w - margin > obs.x &&
            slime.y + margin < obs.y + obs.h && slime.y + slime.h - margin > obs.y) {
            gameOver();
        }
    });
}

function draw() {
    // 背景
    ctx.fillStyle = '#0a0f14';
    ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);
    
    // グリッド線 (速度感)
    ctx.strokeStyle = 'rgba(0, 255, 204, 0.1)';
    ctx.lineWidth = 1;
    let offset = (state.frames * 6 * state.speedMulti) % 50;
    for(let i=0; i<VIRTUAL_WIDTH+50; i+=50) {
        ctx.beginPath(); ctx.moveTo(i-offset, 0); ctx.lineTo(i-offset, VIRTUAL_HEIGHT); ctx.stroke();
    }

    // 地面
    ctx.fillStyle = '#111';
    ctx.fillRect(0, GROUND_Y, VIRTUAL_WIDTH, VIRTUAL_HEIGHT - GROUND_Y);
    ctx.strokeStyle = '#00ffcc';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(VIRTUAL_WIDTH, GROUND_Y); ctx.stroke();

    // 軌道・センサー
    if(state.active) {
        drawTrajectory(ctx, slime);
        drawSensorAndCheckWarning(ctx, slime, obstacles);
    }

    // 雨、障害物、スライム
    rain.forEach(r => r.draw(ctx));
    obstacles.forEach(o => o.draw(ctx));
    slime.draw(ctx);
}

function gameLoop() {
    update();
    draw();
    if(state.active) requestAnimationFrame(gameLoop);
}

// 4. イベントリスナー（ボタンバグ修正版）
function handleCanvasInput(e) {
    e.preventDefault(); // スクロール防止
    if (state.active) slime.jump();
}
// キャンバスだけにタッチイベントを付与（UIのボタンを邪魔しない）
canvas.addEventListener('mousedown', handleCanvasInput);
canvas.addEventListener('touchstart', handleCanvasInput, {passive: false});

// ボタンのイベント（伝播を止める）
function handleBtnInput(e, callback) {
    e.stopPropagation();
    if(e.type === 'touchstart') e.preventDefault();
    callback();
}
document.getElementById('startBtn').addEventListener('click', (e) => handleBtnInput(e, initGame));
document.getElementById('startBtn').addEventListener('touchstart', (e) => handleBtnInput(e, initGame), {passive: false});
document.getElementById('restartBtn').addEventListener('click', (e) => handleBtnInput(e, initGame));
document.getElementById('restartBtn').addEventListener('touchstart', (e) => handleBtnInput(e, initGame), {passive: false});

// 初期描画
handleOrientation();
draw();

</script>
</body>
</html>
