<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>Slime Jump Dash: Neon Drift</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html {
            width: 100%; height: 100%; overflow: hidden; background-color: #0f0f1b;
            font-family: 'Righteous', cursive; touch-action: none;
        }
        #gameContainer {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            transform-origin: top left; transition: transform 0.3s ease;
        }
        canvas { display: block; width: 100%; height: 100%; pointer-events: auto; }
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .score-box {
            position: absolute; top: 5%; left: 5%;
            font-size: clamp(24px, 5vw, 36px); color: #fff;
            text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe; letter-spacing: 2px;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 27, 0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            z-index: 20; pointer-events: auto; backdrop-filter: blur(5px);
            transition: opacity 0.3s;
        }
        .hidden { opacity: 0; pointer-events: none; }
        .overlay h1 {
            font-size: clamp(40px, 8vw, 80px); margin-bottom: 10px;
            color: #fff; text-shadow: 0 0 10px #ff416c, 0 0 20px #ff416c, 0 0 40px #ff4b2b;
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        .overlay p { font-size: clamp(20px, 4vw, 30px); margin-bottom: 30px; color: #aaa; }
        .action-button {
            padding: 15px 50px; font-size: clamp(20px, 4vw, 28px); font-family: 'Righteous', cursive;
            background: transparent; color: #00f2fe; border: 2px solid #00f2fe;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5) inset, 0 0 20px rgba(0, 242, 254, 0.5);
            transition: all 0.2s;
        }
        .action-button:active { background: #00f2fe; color: #0f0f1b; box-shadow: 0 0 30px #00f2fe; transform: scale(0.95); }
        .instructions { margin-top: 30px; font-size: clamp(14px, 3vw, 18px); color: #888; text-align: center; font-family: sans-serif;}
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer"><div class="score-box" id="scoreDisplay">00000</div></div>
    
    <div id="startScreen" class="overlay">
        <h1>NEON SLIME</h1>
        <p>Survive the cyber grid</p>
        <button class="action-button" id="startBtn">TAP TO START</button>
        <div class="instructions">Tap = Jump / Double Tap = Double Jump</div>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1>SYSTEM FAILURE</h1>
        <p id="finalScoreDisplay">Score: 0</p>
        <button class="action-button" id="restartBtn">REBOOT</button>
    </div>
</div>

<script>
/**
 * 1. 画面制御とRetina(DPR)対応
 */
const gameContainer = document.getElementById('gameContainer');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const VIRTUAL_WIDTH = 1000;
const VIRTUAL_HEIGHT = 500;
let scaleRatio = 1;

function handleOrientation() {
    let width = window.innerWidth;
    let height = window.innerHeight;
    if (width < height) {
        gameContainer.style.width = height + 'px';
        gameContainer.style.height = width + 'px';
        gameContainer.style.transform = `rotate(90deg) translateY(-${width}px)`;
        resizeCanvas(height, width);
    } else {
        gameContainer.style.width = width + 'px';
        gameContainer.style.height = height + 'px';
        gameContainer.style.transform = 'none';
        resizeCanvas(width, height);
    }
}

function resizeCanvas(w, h) {
    const dpr = window.devicePixelRatio || 1; // スマホの高画質ディスプレイ対応
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    
    const scaleX = w / VIRTUAL_WIDTH;
    const scaleY = h / VIRTUAL_HEIGHT;
    scaleRatio = Math.min(scaleX, scaleY); // アスペクト比を維持
    
    // 中央寄せのためのオフセット
    ctx.setTransform(1, 0, 0, 1, 0, 0); // リセット
    ctx.scale(dpr, dpr);
    ctx.translate((w - VIRTUAL_WIDTH * scaleRatio) / 2, (h - VIRTUAL_HEIGHT * scaleRatio) / 2);
    ctx.scale(scaleRatio, scaleRatio);
}
window.addEventListener('resize', handleOrientation);
window.addEventListener('orientationchange', handleOrientation);

/**
 * 2. プロシージャル・オーディオ (Web Audio API)
 */
let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;
    if (type === 'jump') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'hit') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
    }
}

/**
 * 3. ゲームクラス群
 */
const GRAVITY = 0.7;
const GROUND_Y = VIRTUAL_HEIGHT - 80;

class Slime {
    constructor() {
        this.w = 50; this.h = 40;
        this.x = 150; this.y = GROUND_Y - this.h;
        this.vy = 0; this.jumpCount = 0;
        this.squishX = 1; this.squishY = 1;
        this.trails = []; // 残像エフェクト用
    }
    jump() {
        if (this.jumpCount < 2) {
            this.vy = -14; this.jumpCount++;
            this.squishX = 0.6; this.squishY = 1.4;
            playSound('jump');
            createParticles(this.x + this.w/2, this.y + this.h, 10, '#00f2fe');
        }
    }
    update() {
        this.vy += GRAVITY;
        this.y += this.vy;
        if (this.y + this.h >= GROUND_Y) {
            if (this.jumpCount > 0) {
                this.squishX = 1.4; this.squishY = 0.6;
                createParticles(this.x + this.w/2, this.y + this.h, 5, '#00f2fe');
            }
            this.y = GROUND_Y - this.h;
            this.vy = 0; this.jumpCount = 0;
        }
        this.squishX += (1 - this.squishX) * 0.15;
        this.squishY += (1 - this.squishY) * 0.15;

        // 残像の記録
        if (state.frames % 3 === 0) {
            this.trails.push({x: this.x, y: this.y, sx: this.squishX, sy: this.squishY, alpha: 0.5});
            if (this.trails.length > 5) this.trails.shift();
        }
    }
    draw(ctx) {
        // 残像の描画
        this.trails.forEach((t, i) => {
            t.alpha -= 0.05;
            ctx.save();
            ctx.translate(t.x + this.w / 2, t.y + this.h);
            ctx.scale(t.sx, t.sy);
            ctx.fillStyle = `rgba(0, 242, 254, ${Math.max(0, t.alpha)})`;
            ctx.beginPath();
            ctx.arc(0, -this.h/2, this.w/2, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        });

        ctx.save();
        ctx.translate(this.x + this.w / 2, this.y + this.h);
        ctx.scale(this.squishX, this.squishY);
        
        // 本体（ネオングロー効果）
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#00f2fe';
        ctx.fillStyle = '#00f2fe';
        ctx.beginPath();
        ctx.moveTo(-this.w/2, 0);
        ctx.lineTo(this.w/2, 0);
        ctx.bezierCurveTo(this.w/2, -this.h*1.2, -this.w/2, -this.h*1.2, -this.w/2, 0);
        ctx.fill();
        ctx.shadowBlur = 0; // リセット
        
        // サイバーな目
        ctx.fillStyle = '#fff';
        ctx.fillRect(-12, -25, 8, 4);
        ctx.fillRect(4, -25, 8, 4);
        ctx.restore();
    }
}

class Obstacle {
    constructor() {
        this.w = Math.random() > 0.5 ? 40 : 60;
        this.h = Math.random() * 60 + 40;
        this.x = VIRTUAL_WIDTH + 100;
        this.y = GROUND_Y - this.h;
        this.passed = false;
        this.type = Math.random() > 0.5 ? 'spike' : 'block';
    }
    update() { this.x -= 8 * state.speedMulti; }
    draw(ctx) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff416c';
        ctx.fillStyle = '#ff416c';
        
        ctx.beginPath();
        if(this.type === 'spike') {
            ctx.moveTo(this.x, this.y + this.h);
            ctx.lineTo(this.x + this.w/2, this.y);
            ctx.lineTo(this.x + this.w, this.y + this.h);
        } else {
            ctx.rect(this.x, this.y, this.w, this.h);
        }
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // 内側のハイライト
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        if(this.type === 'block') ctx.fillRect(this.x+5, this.y+5, this.w-10, 5);
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 1) * 10;
        this.life = 1.0; this.color = color;
        this.size = Math.random() * 5 + 2;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.2; // パーティクルにも重力
        this.life -= 0.03;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.globalAlpha = 1.0;
    }
}

function createParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
}

/**
 * 4. メインループとステート管理
 */
let state = { active: false, score: 0, speedMulti: 1.0, frames: 0, shake: 0 };
let slime, obstacles, particles;

function initGame() {
    slime = new Slime();
    obstacles = []; particles = [];
    state = { active: true, score: 0, speedMulti: 1.0, frames: 0, shake: 0 };
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    initAudio(); // 音声コンテキスト起動
}

function gameOver() {
    state.active = false;
    state.shake = 20; // 画面揺れMax
    playSound('hit');
    createParticles(slime.x + slime.w/2, slime.y + slime.h/2, 30, '#ff416c');
    document.getElementById('finalScoreDisplay').textContent = `FINAL SCORE: ${Math.floor(state.score)}`;
    setTimeout(() => { document.getElementById('gameOverScreen').classList.remove('hidden'); }, 500);
}

function update() {
    if (!state.active) {
        // ゲームオーバー時のパーティクルだけ更新
        particles.forEach(p => p.update());
        if(state.shake > 0) state.shake -= 1;
        return;
    }

    state.frames++;
    state.speedMulti = Math.min(2.5, 1.0 + (state.score / 2000));
    state.score += 0.2 * state.speedMulti;
    document.getElementById('scoreDisplay').textContent = String(Math.floor(state.score)).padStart(5, '0');

    slime.update();

    if (state.frames % Math.floor(Math.max(40, 90 - state.speedMulti*10)) === 0) {
        obstacles.push(new Obstacle());
    }

    particles.forEach((p, i) => { p.update(); if (p.life <= 0) particles.splice(i, 1); });

    obstacles.forEach((obs, i) => {
        obs.update();
        if (obs.x + obs.w < 0) obstacles.splice(i, 1);
        
        // 精密な当たり判定（AABB）
        const margin = 8;
        if (slime.x + margin < obs.x + obs.w && slime.x + slime.w - margin > obs.x &&
            slime.y + margin < obs.y + obs.h && slime.y + slime.h - margin > obs.y) {
            gameOver();
        }
    });
}

function drawBackground() {
    // 時間経過で空の色が変わるギミック
    const skyHue = (220 + state.score * 0.05) % 360;
    const grad = ctx.createLinearGradient(0, 0, 0, VIRTUAL_HEIGHT);
    grad.addColorStop(0, `hsl(${skyHue}, 60%, 10%)`);
    grad.addColorStop(1, `hsl(${skyHue}, 60%, 30%)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);

    // デジタルグリッドの背景（パララックス）
    ctx.strokeStyle = `hsla(${skyHue}, 100%, 50%, 0.2)`;
    ctx.lineWidth = 2;
    const offset = (state.frames * 2 * state.speedMulti) % 100;
    for(let i = -100; i < VIRTUAL_WIDTH + 100; i += 100) {
        ctx.beginPath(); ctx.moveTo(i - offset, 0); ctx.lineTo(i - offset - 200, VIRTUAL_HEIGHT); ctx.stroke();
    }

    // 地面（サイバーデッキ風）
    ctx.fillStyle = '#0f0f1b';
    ctx.fillRect(0, GROUND_Y, VIRTUAL_WIDTH, VIRTUAL_HEIGHT - GROUND_Y);
    ctx.fillStyle = '#ff416c';
    ctx.fillRect(0, GROUND_Y, VIRTUAL_WIDTH, 4);
    
    // スクロールする地面のライン
    ctx.fillStyle = '#ff416c';
    for(let i = 0; i < VIRTUAL_WIDTH; i += 80) {
        ctx.fillRect(i - (state.frames * 8 * state.speedMulti)%80, GROUND_Y, 20, VIRTUAL_HEIGHT - GROUND_Y);
    }
}

function draw() {
    ctx.save();
    
    // スクリーンシェイク適用
    if (state.shake > 0) {
        const dx = (Math.random() - 0.5) * state.shake;
        const dy = (Math.random() - 0.5) * state.shake;
        ctx.translate(dx, dy);
    }

    drawBackground();
    obstacles.forEach(o => o.draw(ctx));
    if(state.active || state.shake > 0) slime.draw(ctx);
    particles.forEach(p => p.draw(ctx));

    ctx.restore();
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// 入力ハンドリング
function handleInput(e) {
    if(e.type === 'touchstart') e.preventDefault();
    if (state.active) slime.jump();
}
gameContainer.addEventListener('mousedown', handleInput);
gameContainer.addEventListener('touchstart', handleInput, {passive: false});
document.getElementById('startBtn').addEventListener('click', initGame);
document.getElementById('restartBtn').addEventListener('click', initGame);

// 初期化
handleOrientation();
drawBackground(); // 初期背景描画
requestAnimationFrame(gameLoop);

</script>
</body>
</html>
