<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
    <title>Gothic Dash: Crimson Moon</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050508; font-family: 'Cormorant Garamond', serif; touch-action: none; }
        #gameContainer { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; transform-origin: top left; transition: transform 0.3s ease; }
        canvas { display: block; width: 100%; height: 100%; z-index: 1; }
        
        /* UI Layer */
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .hud-box { font-family: 'Cinzel', serif; color: #b30000; font-size: clamp(16px, 4vw, 24px); text-shadow: 0 0 10px #ff0000, 2px 2px 0px #000; letter-spacing: 2px; }
        #warningDisplay { color: #ff0000; opacity: 0; transition: opacity 0.1s; font-weight: bold; }
        #warningDisplay.active { opacity: 1; animation: heartbeat 0.5s infinite alternate; }
        @keyframes heartbeat { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        /* Overlays - バグ修正: .hiddenはdisplay:noneで完全に消す */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 10, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; backdrop-filter: blur(5px); }
        .hidden { display: none !important; }
        
        .overlay h1 { font-family: 'Cinzel', serif; font-size: clamp(36px, 8vw, 70px); margin-bottom: 5px; color: #d4af37; text-shadow: 0 0 20px #b30000, 0 5px 5px #000; letter-spacing: 4px; text-align: center; }
        .overlay p { font-size: clamp(18px, 4vw, 28px); margin-bottom: 40px; color: #888; font-style: italic; }
        
        /* 確実なボタン */
        .action-button { padding: 15px 50px; font-size: clamp(20px, 5vw, 28px); font-family: 'Cinzel', serif; font-weight: bold; background: rgba(179, 0, 0, 0.1); color: #d4af37; border: 2px solid #b30000; border-radius: 4px; cursor: pointer; pointer-events: auto; box-shadow: 0 0 15px rgba(179, 0, 0, 0.4) inset, 0 5px 15px rgba(0,0,0,0.8); transition: all 0.2s; }
        .action-button:active { background: #b30000; color: #fff; transform: translateY(4px); box-shadow: 0 0 5px rgba(179, 0, 0, 0.8); }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="uiLayer">
        <div style="display:flex; justify-content:space-between;">
            <div class="hud-box" id="scoreDisplay">SOULS: 0</div>
            <div class="hud-box" id="warningDisplay">DANGER</div>
        </div>
    </div>
    
    <div id="startScreen" class="overlay">
        <h1>GOTHIC DASH</h1>
        <p>Escape the Crimson Moon</p>
        <button class="action-button" onclick="startGame()">ENTER</button>
    </div>

    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color:#880000; text-shadow: 0 0 20px #ff0000;">PERISHED</h1>
        <p id="finalScoreDisplay">Souls Collected: 0</p>
        <button class="action-button" onclick="startGame()">RESURRECT</button>
    </div>
</div>

<script>
/**
 * 1. 画面制御
 */
const gameContainer = document.getElementById('gameContainer');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const VIRTUAL_WIDTH = 900;
const VIRTUAL_HEIGHT = 450;
let scaleRatio = 1;

function handleOrientation() {
    let width = window.innerWidth;
    let height = window.innerHeight;
    if (width < height) {
        gameContainer.style.width = height + 'px';
        gameContainer.style.height = width + 'px';
        gameContainer.style.transform = `rotate(90deg) translateY(-${width}px)`;
        resizeCanvas(height, width);
    } else {
        gameContainer.style.width = width + 'px';
        gameContainer.style.height = height + 'px';
        gameContainer.style.transform = 'none';
        resizeCanvas(width, height);
    }
}

function resizeCanvas(w, h) {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    scaleRatio = Math.min(w / VIRTUAL_WIDTH, h / VIRTUAL_HEIGHT);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    ctx.translate((w - VIRTUAL_WIDTH * scaleRatio) / 2, (h - VIRTUAL_HEIGHT * scaleRatio) / 2);
    ctx.scale(scaleRatio, scaleRatio);
}
window.addEventListener('resize', handleOrientation);
window.addEventListener('orientationchange', handleOrientation);

/**
 * 2. ゲームロジック
 */
const GRAVITY = 0.7;
const GROUND_Y = VIRTUAL_HEIGHT - 40;
const JUMP_POWER = -12;

// ★ 新キャラ：ゴスロリ少女
class GothLoli {
    constructor() {
        this.w = 40; this.h = 60;
        this.x = 100; this.y = GROUND_Y - this.h;
        this.vy = 0; this.jumpCount = 0;
    }
    jump() {
        if (this.jumpCount < 2) {
            this.vy = JUMP_POWER;
            this.jumpCount++;
            createParticles(this.x + this.w/2, this.y + this.h, 15, '#b30000');
        }
    }
    update() {
        this.vy += GRAVITY;
        this.y += this.vy;
        if (this.y + this.h >= GROUND_Y) {
            this.y = GROUND_Y - this.h;
            this.vy = 0; this.jumpCount = 0;
        }
    }
    draw(ctx) {
        // 走りアニメーション（上下の揺れ）
        let bobbing = (this.vy === 0 && state.active) ? Math.sin(state.frames * 0.4) * 3 : 0;
        let hairSway = (this.vy !== 0) ? 15 : Math.sin(state.frames * 0.2) * 5; // ジャンプ中は髪が上に

        ctx.save();
        ctx.translate(this.x + this.w/2, this.y + this.h + bobbing);

        // --- 奥のツインテール ---
        ctx.fillStyle = '#0a0a0a';
        ctx.beginPath();
        ctx.ellipse(-8, -45 - hairSway/2, 10, 25, (30 + hairSway) * Math.PI/180, 0, Math.PI*2);
        ctx.fill();

        // --- ドレス（黒） ---
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.moveTo(0, -50); // 首元
        ctx.lineTo(-20, -10); // スカート左
        ctx.bezierCurveTo(-10, -5, 10, -5, 20, -10); // スカート裾アーチ
        ctx.lineTo(5, -50); // 右肩
        ctx.fill();

        // --- ドレスのフリル（白） ---
        ctx.fillStyle = '#ddd';
        for(let i = -15; i <= 15; i += 8) {
            ctx.beginPath();
            ctx.arc(i, -10, 4, 0, Math.PI);
            ctx.fill();
        }

        // --- 脚と靴 ---
        ctx.fillStyle = '#ffe0d0'; // 肌色
        ctx.fillRect(-8, -10, 4, 10);
        ctx.fillRect(4, -10, 4, 10);
        ctx.fillStyle = '#111'; // 黒い靴
        ctx.fillRect(-10, -3, 6, 4);
        ctx.fillRect(4, -3, 6, 4);

        // --- 頭/顔 ---
        ctx.fillStyle = '#ffe0d0';
        ctx.beginPath();
        ctx.arc(0, -50, 14, 0, Math.PI*2);
        ctx.fill();

        // --- 手前のツインテールと前髪 ---
        ctx.fillStyle = '#0a0a0a';
        // 前髪
        ctx.beginPath();
        ctx.arc(0, -52, 15, Math.PI, 0);
        ctx.fill();
        ctx.fillRect(-14, -52, 28, 8); // パッツン前髪
        
        // 手前ツインテール
        ctx.beginPath();
        ctx.ellipse(5, -45 - hairSway/2, 10, 25, (-20 - hairSway) * Math.PI/180, 0, Math.PI*2);
        ctx.fill();

        // --- ヘッドドレス（白いレース） ---
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(0, -64, 12, 4, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#b30000'; // 赤いリボン
        ctx.fillRect(-3, -66, 6, 6);

        // --- 瞳（紅い目、右向き） ---
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(6, -48, 4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#b30000';
        ctx.beginPath(); ctx.arc(7, -48, 2, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(7.5, -48, 1, 0, Math.PI*2); ctx.fill();

        ctx.restore();
    }
}

// ★ 障害物：墓石
class Tombstone {
    constructor(speed) {
        this.w = 30 + Math.random() * 20;
        this.h = 40 + Math.random() * 30;
        this.x = VIRTUAL_WIDTH + 50;
        this.y = GROUND_Y - this.h;
        this.speed = speed;
    }
    update() { this.x -= 6 * this.speed; }
    draw(ctx) {
        ctx.fillStyle = '#2a2a30';
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 2;
        
        // 墓石の形（上部が丸い）
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + this.h);
        ctx.lineTo(this.x, this.y + 15);
        ctx.arc(this.x + this.w/2, this.y + 15, this.w/2, Math.PI, 0);
        ctx.lineTo(this.x + this.w, this.y + this.h);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // 墓石の十字架
        ctx.fillStyle = '#111';
        let cx = this.x + this.w/2;
        let cy = this.y + 25;
        ctx.fillRect(cx - 2, cy - 10, 4, 20);
        ctx.fillRect(cx - 8, cy - 2, 16, 4);
    }
}

// 魔法陣パーティクル
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = (Math.random() - 1) * 6;
        this.life = 1.0; this.color = color;
        this.size = Math.random() * 3 + 1;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.life -= 0.04;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

/**
 * 3. メインシステム
 */
let state = { active: false, score: 0, speedMulti: 1.0, frames: 0 };
let player, obstacles, particles;
let animId;

function createParticles(x, y, count, color) {
    for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
}

// ★ 確実なスタート関数
window.startGame = function() {
    player = new GothLoli();
    obstacles = []; particles = [];
    state = { active: true, score: 0, speedMulti: 1.0, frames: 0 };
    
    // UIを隠す（display:noneにする）
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('warningDisplay').classList.remove('active');
    
    // 多重ループ防止
    if(animId) cancelAnimationFrame(animId);
    gameLoop();
};

function gameOver() {
    state.active = false;
    document.getElementById('warningDisplay').classList.remove('active');
    document.getElementById('finalScoreDisplay').textContent = `Souls Collected: ${Math.floor(state.score)}`;
    document.getElementById('gameOverScreen').classList.remove('hidden');
    createParticles(player.x + player.w/2, player.y + player.h/2, 40, '#880000');
}

// 魔眼センサーと軌道
function drawMagicSensor(ctx, player, obstacles) {
    let nearest = obstacles.find(o => o.x > player.x);
    if (!nearest) return;

    let dist = nearest.x - (player.x + player.w);
    let isWarning = dist < 200;

    // 魔力軌道（ジャンプ予測線）
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(179, 0, 0, 0.3)';
    ctx.setLineDash([4, 6]);
    ctx.lineWidth = 2;
    let simX = player.x + player.w/2;
    let simY = player.y + player.h;
    let simVy = player.vy === 0 ? JUMP_POWER : player.vy;
    ctx.moveTo(simX, simY);
    for(let i=0; i<30; i++) {
        simX += 6 * state.speedMulti;
        simVy += GRAVITY; simY += simVy;
        if(simY >= GROUND_Y) { ctx.lineTo(simX, GROUND_Y); break; }
        ctx.lineTo(simX, simY);
    }
    ctx.stroke(); ctx.setLineDash([]);

    // 魔眼レーザー
    if (isWarning && player.y + player.h >= nearest.y) {
        ctx.strokeStyle = 'rgba(255, 0, 0, 0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(player.x + player.w, player.y + player.h/2 - 10); // 目線から
        ctx.lineTo(nearest.x, player.y + player.h/2 - 10);
        ctx.stroke();
        document.getElementById('warningDisplay').classList.add('active');
    } else {
        document.getElementById('warningDisplay').classList.remove('active');
    }
}

function update() {
    if (!state.active) return;
    state.frames++;
    state.speedMulti = Math.min(2.5, 1.0 + (state.score / 1000));
    state.score += 0.1 * state.speedMulti;
    
    document.getElementById('scoreDisplay').textContent = `SOULS: ${Math.floor(state.score)}`;

    player.update();
    particles.forEach((p, i) => { p.update(); if (p.life <= 0) particles.splice(i, 1); });

    if (state.frames % Math.floor(Math.max(40, 90 - state.speedMulti*15)) === 0) {
        obstacles.push(new Tombstone(state.speedMulti));
    }

    obstacles.forEach((obs, i) => {
        obs.update();
        if (obs.x + obs.w < 0) obstacles.splice(i, 1);
        
        let hitbox = 8; // スカートの分、当たり判定を少し甘めに
        if (player.x + hitbox < obs.x + obs.w && player.x + player.w - hitbox > obs.x &&
            player.y + hitbox < obs.y + obs.h && player.y + player.h > obs.y) {
            gameOver();
        }
    });
}

function drawBackground() {
    // 漆黒の空
    ctx.fillStyle = '#08050e';
    ctx.fillRect(0, 0, VIRTUAL_WIDTH, VIRTUAL_HEIGHT);
    
    // 赤い月（パララックス）
    let moonX = 600 - (state.frames * 0.5) % 1500;
    ctx.beginPath();
    ctx.arc(moonX, 150, 80, 0, Math.PI*2);
    ctx.fillStyle = '#b30000';
    ctx.shadowBlur = 40; ctx.shadowColor = '#ff0000';
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // 赤い雨（血の雨）
    ctx.strokeStyle = 'rgba(179, 0, 0, 0.4)';
    ctx.lineWidth = 1;
    for(let i=0; i<30; i++) {
        let rx = (Math.random() * VIRTUAL_WIDTH * 2) - (state.frames * 10) % (VIRTUAL_WIDTH*2);
        let ry = (Math.random() * VIRTUAL_HEIGHT + state.frames * 15) % VIRTUAL_HEIGHT;
        ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx - 5, ry + 15); ctx.stroke();
    }

    // 地面（霧と黒土）
    ctx.fillStyle = '#111';
    ctx.fillRect(0, GROUND_Y, VIRTUAL_WIDTH, VIRTUAL_HEIGHT - GROUND_Y);
    ctx.fillStyle = '#222';
    ctx.fillRect(0, GROUND_Y, VIRTUAL_WIDTH, 2);
}

function draw() {
    drawBackground();
    if(state.active) {
        drawMagicSensor(ctx, player, obstacles);
    }
    obstacles.forEach(o => o.draw(ctx));
    
    if(state.active || player) player.draw(ctx);
    particles.forEach(p => p.draw(ctx));
}

function gameLoop() {
    update();
    draw();
    if(state.active) {
        animId = requestAnimationFrame(gameLoop);
    }
}

// 4. キャンバス操作（ボタン操作と完全に分離）
function handleInput(e) {
    e.preventDefault(); // キャンバスでのスクロール防止
    if (state.active) player.jump();
}
// キャンバス自体をタッチした時だけジャンプ（UIボタンを邪魔しない）
canvas.addEventListener('mousedown', handleInput);
canvas.addEventListener('touchstart', handleInput, {passive: false});

// 初期描画
handleOrientation();
player = new GothLoli(); // スタート画面用の初期描画
drawBackground();
player.draw(ctx);

</script>
</body>
</html>
